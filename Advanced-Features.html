<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform Features | InstructoHub</title>
  <meta name="title" content="Advanced AI Features for Smarter Learning Automation" />
  <meta name="description"
    content="Boost learning with InstructoHub's AI-powered LMS featuring AI course generator, AI quiz generator, and AI auto-grading system for smarter education." />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="canonical" href="https://www.instructohub.com/Advanced-Features.html" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#fdf4f0",
              100: "#fce8e0",
              200: "#f9d1c1",
              300: "#f5b9a2",
              400: "#f09c7d",
              500: "#e16b3b",
              600: "#d15a2b",
              700: "#b44a22",
              800: "#933c1d",
              900: "#78301a",
              DEFAULT: "#e16b3b",
            },
            secondary: {
              50: "#e7eaeb",
              100: "#cfd5d7",
              200: "#a0acb0",
              300: "#728389",
              400: "#435a62",
              500: "#1b3942",
              600: "#18333b",
              700: "#152b32",
              800: "#122229",
              900: "#0e1a20",
              DEFAULT: "#1b3942",
            },
            success: {
              DEFAULT: "#4CAF50",
              dark: "#3a8c3f",
            },
            danger: {
              DEFAULT: "#EF4444",
              dark: "#B91C1C",
            },
            neutral: {
              50: "#fafafa",
              100: "#f5f5f5",
              200: "#e5e5e5",
              300: "#d4d4d4",
              400: "#a3a3a3",
              500: "#737373",
              600: "#525252",
              700: "#404040",
              800: "#262626",
              900: "#171717",
            },
            background: {
              page: "#f7f7f7",
              card: "#ffffff",
            },
            border: {
              DEFAULT: "#e5e7eb",
              accent: "#e16b3b",
            },
            text: {
              primary: "#1b3942",
              secondary: "#4b5563",
              muted: "#6b7280",
              light: "#ffffff",
            },
          },
          animation: {
            fadeIn: "fadeIn 0.5s ease-out forwards",
            spin: "spin 1s linear infinite",
          },
          keyframes: {
            fadeIn: {
              "0%": {
                opacity: "0",
                transform: "translateY(10px)",
              },
              "100%": {
                opacity: "1",
                transform: "translateY(0)",

            spin: {
              from: { transform: "rotate(0deg)" },

  <script>
    fetch("/private/header.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("header-placeholder").innerHTML = data;
        lucide.createIcons();
        const header = document.getElementById("header");
        window.addEventListener("scroll", () => {
          if (window.scrollY > 10) {
            header.classList.add("scrolled");
          } else {
            header.classList.remove("scrolled");
          }
        });
      });
    fetch("/private/footer.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("footer-placeholder").innerHTML = data;
        lucide.createIcons();
        document.getElementById("current-year").textContent =
          new Date().getFullYear();
      });
  </script>
  <style>
    #page-loader {
      z-index: 50;
    }

    .loader-spinner {
      border-top-color: #e16b3b;
      border-right-color: transparent;
      border-bottom-color: transparent;
      border-left-color: transparent;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col text-secondary">
  <div id="page-loader" class="fixed inset-0 bg-white flex items-center justify-center transition-opacity duration-300">
    <div class="loader-spinner w-16 h-16 border-4 rounded-full animate-spin"></div>
  </div>
  <div class="w-full">
    <div class="h-12 md:block hidden"></div>
    <div class="h-16"></div>
  </div>
  <div id="header-placeholder"></div>
  <main id="main-content" class="hidden">
    <section id="all-features" class="py-20 bg-white">
      <div class="container mx-auto px-6">
        <div class="grid lg:grid-cols-4 gap-12 lg:gap-16 items-start">
          <aside class="lg:col-span-1 sticky top-28 hidden lg:block">
            <h3 class="text-lg font-semibold text-secondary mb-4">
              Jump to Category
            </h3>
            <nav id="sidebar-nav" class="flex flex-col space-y-2"></nav>
          </aside>
          <div class="lg:col-span-3">
            <div id="features-container" class="space-y-20"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <div id="feature-modal" class="fixed inset-0 z-[60] hidden" role="dialog" aria-modal="true">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
    <div class="relative z-10 flex items-center justify-center h-screen px-4 py-8">
      <button onclick="navigateModal(-1)"
        class="absolute left-4 z-20 p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-all hidden md:block">
        <i data-lucide="chevron-left" class="w-10 h-10"></i>
      </button>
      <div
        class="bg-white w-full max-w-5xl rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[85vh] relative animate-fadeIn">
        <button onclick="closeModal()"
          class="absolute top-4 right-4 z-30 p-2 text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <div class="p-6 lg:px-8 lg:pt-8 lg:pb-4 bg-white relative shrink-0">
          <div>
            <div id="modal-category-pill"
              class="inline-block px-3 py-1 bg-brand/10 text-brand text-xs font-semibold rounded-full mb-3">
              Category
            </div>
            <h3 id="modal-title" class="text-2xl font-bold text-secondary mb-3 pr-8">Feature Title</h3>
            <div class="max-h-[15vh] overflow-y-auto custom-scrollbar pr-2">
              <p id="modal-desc" class="text-secondary/70 text-base md:text-lg leading-relaxed">
                Feature description goes here...
              </p>
            </div>
          </div>
        </div>
        <div class="relative flex-1 bg-gray-50 w-full min-h-0 overflow-hidden group">
          <div id="modal-img-loader" class="absolute inset-0 flex items-center justify-center z-10">
            <div class="w-8 h-8 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
          </div>
          <img id="modal-image" src="" alt="Feature Preview"
            class="absolute inset-0 w-full h-full object-contain p-4 transition-transform duration-500 z-0"
            onload="document.getElementById('modal-img-loader').classList.add('hidden')">
        </div>
        <div
          class="p-4 lg:px-8 lg:py-6 border-t border-gray-100 bg-white flex items-center justify-between gap-4 shrink-0">
          <div class="flex md:hidden gap-3">
            <button onclick="navigateModal(-1)" class="p-3 border border-gray-200 rounded-full hover:bg-gray-50"><i
                data-lucide="chevron-left" class="w-5 h-5"></i></button>
            <button onclick="navigateModal(1)" class="p-3 border border-gray-200 rounded-full hover:bg-gray-50"><i
                data-lucide="chevron-right" class="w-5 h-5"></i></button>
          </div>
          <a id="modal-link-btn" href="#" target="_blank"
            class="flex-1 md:flex-none text-center bg-brand hover:bg-brand-600 text-white px-6 py-3 rounded-lg font-medium transition-colors flex items-center justify-center gap-2 ml-auto">
            <span>Learn More</span>
            <i data-lucide="external-link" class="w-4 h-4"></i>
          </a>
        </div>
      </div>
      <button onclick="navigateModal(1)"
        class="absolute right-4 z-20 p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-all hidden md:block">
        <i data-lucide="chevron-right" class="w-10 h-10"></i>
      </button>
    </div>
  </div>
  <script>
    let globalFeatureList = [];
    let currentFeatureIndex = 0;
    function toggleMobileMenu() {
      const mobileMenu = document.getElementById("mobile-menu");
      const menuIcon = document.getElementById("menu-icon");
      const closeIcon = document.getElementById("close-icon");
      if (mobileMenu.classList.contains("hidden")) {
        mobileMenu.classList.remove("hidden");
        menuIcon.classList.add("hidden");
        closeIcon.classList.remove("hidden");
      } else {
        mobileMenu.classList.add("hidden");
        menuIcon.classList.remove("hidden");
        closeIcon.classList.add("hidden");
      }
    }
    function openModal(index) {
      currentFeatureIndex = index;
      updateModalContent();
      const modal = document.getElementById('feature-modal');
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      const modal = document.getElementById('feature-modal');
      modal.classList.add('hidden');
      document.body.style.overflow = '';
      setTimeout(() => {
        document.getElementById('modal-image').src = "";
      }, 200);
    }
    function navigateModal(direction) {
      let newIndex = currentFeatureIndex + direction;
      if (newIndex < 0) newIndex = globalFeatureList.length - 1;
      if (newIndex >= globalFeatureList.length) newIndex = 0;
      currentFeatureIndex = newIndex;
      updateModalContent();
    }
    function updateModalContent() {
      const feature = globalFeatureList[currentFeatureIndex];
      const imgEl = document.getElementById('modal-image');
      const loaderEl = document.getElementById('modal-img-loader');
      const titleEl = document.getElementById('modal-title');
      const descEl = document.getElementById('modal-desc');
      const pillEl = document.getElementById('modal-category-pill');
      const linkBtn = document.getElementById('modal-link-btn');
      loaderEl.classList.remove('hidden');
      imgEl.src = feature.image;
      titleEl.textContent = feature.name;
      descEl.textContent = feature.description;
      pillEl.textContent = feature.categoryName || 'Feature';
      if (feature.link) {
        linkBtn.href = feature.link;
        linkBtn.classList.remove('hidden');
        linkBtn.classList.add('flex');
      } else {
        linkBtn.classList.add('hidden');
        linkBtn.classList.remove('flex');
      }
    }
    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('feature-modal');
      if (modal.classList.contains('hidden')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') navigateModal(-1);
      if (e.key === 'ArrowRight') navigateModal(1);
    });
    document.addEventListener("DOMContentLoaded", function () {
      lucide.createIcons();
    });
    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/ & /g, "-")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }
    function createFeatureItem(feature, globalIndex) {
      return `
            <div class="feature-item cursor-pointer group hover:bg-neutral-50 p-4 -m-4 rounded-xl transition-colors" 
                 onClick="openModal(${globalIndex})">
              <h4 class="text-lg font-semibold text-secondary mb-1 flex items-center gap-2 group-hover:text-brand transition-colors">
                <i data-lucide="${feature.icon}" class="w-5 h-5 text-brand"></i>
                <span>${feature.name}</span>
              </h4>
              <p class="text-secondary/70 pl-7 text-sm">
                ${feature.description}
              </p>
            </div>
        `;
    }
    function createModule(module) {
      return `
            <div>
              <h3 class="text-2xl font-semibold text-secondary mb-6 border-b border-neutral-200 pb-3">
                ${module.title}
              </h3>
              <div class="grid md:grid-cols-2 gap-x-8 gap-y-6" id="module-${slugify(module.title)}">
                </div>
            </div>
        `;
    }
    function createCategoryArticle(category) {
      const slug = slugify(category.title);
      const iconMap = {
        "Administration & Management": "server-cog",
        "Content & Course Management": "book-open-check",
        "AI-Powered Suite": "sparkles",
        "Assessment & Grading": "graduation-cap",
        "Communication & Collaboration": "message-circle",
        "Analytics & Reporting": "pie-chart",
        "User Experience & Integrations": "globe-2",
      };
      const categoryIcon = iconMap[category.title] || "folder";
      const modulesHtml = category.modules.map(createModule).join("");
      return `
            <article id="${slug}">
              <div class="flex items-center gap-4 mb-5">
                <div class="bg-brand/10 text-brand p-3 rounded-lg inline-block">
                  <i data-lucide="${categoryIcon}" class="w-8 h-8"></i>
                </div>
                <h2 class="text-3xl font-bold text-secondary">
                  ${category.title}
                </h2>
              </div>
              <p class="text-lg text-secondary/70 mb-10">
                ${category.description}
              </p>
              <div class="space-y-12">
                ${modulesHtml}
              </div>
            </article>
        `;
    }
    function createSidebarLink(category) {
      const slug = slugify(category.title);
      return `
            <a href="#${slug}" class="font-medium text-secondary/70 hover:text-brand border-l-2 border-transparent hover:border-brand pl-3 transition-all">
              ${category.title}
            </a>
        `;
    }
    function hideLoaderAndShowContent() {
      document.getElementById("page-loader").classList.add("opacity-0");
      setTimeout(() => {
        document.getElementById("page-loader").classList.add("hidden");
        document.getElementById("main-content").classList.remove("hidden");
      }, 300);
    }
    async function loadFeatures() {
      const apiUrl = "https://script.google.com/macros/s/AKfycbySeZNvKzuOOpfVPDwi5sU7-qK6NNM6W0_NDkvY1GcAnhGVaiw9ALuJm5bKwwK8qrUEUw/exec";
      const featuresContainer = document.getElementById("features-container");
      const sidebarNav = document.getElementById("sidebar-nav");
      try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const data = await response.json();
        const categories = data.categories;
        featuresContainer.innerHTML = "";
        sidebarNav.innerHTML = "";
        globalFeatureList = [];
        const mainContentHtml = categories.map(createCategoryArticle).join("");
        featuresContainer.innerHTML = mainContentHtml;
        const sidebarHtml = categories.map(createSidebarLink).join("");
        sidebarNav.innerHTML = sidebarHtml;
        let globalIndex = 0;
        categories.forEach(category => {
          category.modules.forEach(module => {
            const moduleContainer = document.getElementById(`module-${slugify(module.title)}`);
            let moduleFeaturesHtml = "";
            module.features.forEach(feature => {
              const extendedFeature = {
                ...feature,
                categoryName: category.title,
                moduleName: module.title
              };
              globalFeatureList.push(extendedFeature);
              moduleFeaturesHtml += createFeatureItem(extendedFeature, globalIndex);
              globalIndex++;
            });
            if (moduleContainer) {
              moduleContainer.innerHTML = moduleFeaturesHtml;
            }
          });
        });
        lucide.createIcons();
        initScrollInteractions();
        hideLoaderAndShowContent();
      } catch (error) {
        console.error("Error loading features data:", error);
        featuresContainer.innerHTML = '<p class="text-danger-dark text-center text-xl">Failed to load features. Please try again later.</p>';
        hideLoaderAndShowContent();
      }
    }
    function initScrollInteractions() {
      const sections = document.querySelectorAll("article[id]");
      const navLinks = document.querySelectorAll("aside nav a");
      if (window.featureObserver) {
        sections.forEach((section) => window.featureObserver.unobserve(section));
      }
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              navLinks.forEach((link) => {
                link.classList.remove("text-brand", "border-brand");
                link.classList.add("text-secondary/70", "border-transparent");
                if (link.getAttribute("href") === `#${entry.target.id}`) {
                  link.classList.add("text-brand", "border-brand");
                  link.classList.remove("text-secondary/70", "border-transparent");
                }
              });
            }
          });
        },
        { rootMargin: "-30% 0px -60% 0px" }
      );
      window.featureObserver = observer;
      sections.forEach((section) => {
        observer.observe(section);
      });
      navLinks.forEach((link) => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const targetId = link.getAttribute("href").substring(1);
          const target = document.getElementById(targetId);
          if (target) {
            const offset = 100;
            const topPos = target.getBoundingClientRect().top + window.scrollY - offset;
            window.scrollTo({
              top: topPos,
              behavior: "smooth",
            });
          }
        });
      });
    }
    document.addEventListener("DOMContentLoaded", loadFeatures);
  </script>
</body>

</html>
